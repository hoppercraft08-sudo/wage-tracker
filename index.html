<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wage Tracker Pro</title>
  <style>
    :root{
      --bg:#0b0f14;--card:#121826;--accent:#4da3ff;--accent2:#22c55e;
      --text:#e8eef5;--muted:#9aa4b2;--line:#1f2a44;--chip:#0e1422;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:radial-gradient(1200px 600px at 50% -200px,#1a2336,var(--bg));
      color:var(--text);
      min-height:100vh;
    }
    .app{
      min-height:100vh;
      padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
      background:var(--card);
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .row{display:flex;align-items:center;justify-content:space-between}
    .badge{font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(77,163,255,.15);color:var(--accent)}
    .badge.off{background:rgba(245,158,11,.15);color:#f59e0b}
    .amount{font-size:44px;font-weight:800;text-align:center}
    .minor{font-size:22px;color:var(--accent)}
    .sub{font-size:13px;color:var(--muted);text-align:center}
    .card{background:#0e1422;border:1px solid var(--line);border-radius:16px;padding:12px}
    .bar{height:10px;background:#0b1020;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
    .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2))}
    select{width:100%;padding:12px;border-radius:12px;background:var(--chip);color:var(--text);border:1px solid var(--line)}
  </style>
</head>
<body>
<div class="app">
  <div class="row">
    <strong>Wage Tracker</strong>
    <div id="state" class="badge">LIVE</div>
  </div>

  <div class="card">
    <div class="amount" id="money">£0.<span class="minor">00000</span></div>
    <div class="sub">Total since start</div>
    <div class="bar"><i id="progress"></i></div>
  </div>

  <div class="card">
    <select id="view">
      <option value="all">Total since start</option>
      <option value="week">This week</option>
      <option value="month">This month</option>
    </select>
  </div>
</div>

<script>
const DAILY_NET=91.30, PAID_HOURS=8, BREAK_HRS=1;
const START=21, END=6;
const JOB_START=new Date(2026,1,1,21,0,0);
const HOURLY=DAILY_NET/PAID_HOURS;

function isWorkDay(d){return d.getDay()<=4}
function shiftWindow(now){
  const s=new Date(now);s.setHours(START,0,0,0);
  if(now.getHours()<END) s.setDate(s.getDate()-1);
  const e=new Date(s);e.setHours(e.getHours()+PAID_HOURS+BREAK_HRS);
  return {s,e};
}
function inShift(now){const {s,e}=shiftWindow(now);return isWorkDay(s)&&now>=s&&now<=e}
function progress(now){
  if(!inShift(now)) return {money:0,pct:0};
  const {s}=shiftWindow(now);
  let h=(now-s)/36e5; if(h>4) h-=BREAK_HRS;
  h=Math.max(0,Math.min(PAID_HOURS,h));
  return {money:h*HOURLY,pct:h/PAID_HOURS};
}
function completed(now,scope){
  let total=0; let d=new Date(JOB_START);
  while(d<now){
    if(isWorkDay(d)){
      const s=new Date(d);s.setHours(START,0,0,0);
      const e=new Date(s);e.setHours(e.getHours()+PAID_HOURS+BREAK_HRS);
      if(e<=now){
        if(scope==='week'){
          const w=new Date(now);w.setDate(w.getDate()-w.getDay());w.setHours(0,0,0,0);
          if(s<w){d.setDate(d.getDate()+1);continue;}
        }
        if(scope==='month'&&(s.getMonth()!=now.getMonth()||s.getFullYear()!=now.getFullYear())){
          d.setDate(d.getDate()+1);continue;
        }
        total+=DAILY_NET;
      }
    }
    d.setDate(d.getDate()+1);
  }
  return total;
}
function render(){
  const now=new Date();
  const view=document.getElementById('view').value;
  const total=completed(now,view)+progress(now).money;
  const f=total.toFixed(5).split('.');
  document.getElementById('money').innerHTML=`£${f[0]}.${f[1].slice(0,2)}<span class="minor">${f[1].slice(2)}</span>`;
  document.getElementById('progress').style.width=(progress(now).pct*100)+'%';
  const st=document.getElementById('state');
  st.textContent=inShift(now)?'IN SHIFT':'OFF SHIFT';
  st.className='badge '+(inShift(now)?'':'off');
}
setInterval(render,100);render();
</script>
</body>
</html>
